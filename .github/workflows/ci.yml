name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.build-group }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x64
            build-group: linux-x64
          - os: ubuntu-22.04-arm
            arch: arm64
            build-group: linux-arm64
          - os: macos-latest
            arch: x64
            build-group: darwin-universal
          - os: windows-2022
            arch: x86
            build-group: win32-x86
          - os: windows-2022
            arch: x64
            build-group: win32-x64
          - os: windows-11-arm
            arch: arm64
            build-group: win32-arm64
    env:
      BUILD_GROUP: ${{ matrix.build-group }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
      with:
        node-version: '20'
        architecture: ${{ matrix.arch }}
    - name: Install linux dependencies
      if: ${{ (matrix.build-group == 'linux-x64') || (matrix.build-group == 'linux-arm64') }}
      run: sudo apt-get install libxtst-dev libpng++-dev
    - run: npm ci
    - name: Prebuildify
      run: npm run prebuild-$BUILD_GROUP
      shell: bash
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: prebuilds-${{ matrix.build-group }}
        path: prebuilds/
        if-no-files-found: error
  publish:
    name: Publish to npm
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
      with:
        pattern: prebuilds-*
        path: prebuilds
        merge-multiple: true
    - uses: phips28/gh-action-bump-version@215e27a882516826c59df7f09da8c67d5f375cbd
      with:
        tag-prefix: 'v'
        version-type: 'patch'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
      with:
        node-version: '24'
        registry-url: 'https://registry.npmjs.org'
    - run: npm publish --provenance --access public
